      <stop offset="100%" stop-color="#28243f"/>
    </linearGradient>
    <linearGradient id="bluePanel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6a7ca7"/>
      <stop offset="100%" stop-color="#2c3e73"/>
    </linearGradient>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="softNoise">
        <feFuncA type="table" tableValues="0 0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="multiply"/>
    </filter>
  </defs>

