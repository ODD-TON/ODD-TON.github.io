    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#c9c8cf"/>
      <stop offset="55%" stop-color="#8f8da0"/>
      <stop offset="100%" stop-color="#716f82"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" x2="1">
